# ============================================================
# Transaction Anomaly Detection - Production Configuration
# ============================================================

# --- Model ---
model:
  type: "IsolationForest"                # IsolationForest | LocalOutlierFactor | OneClassSVM
  path: "artifacts/model.joblib"
  encoders_path: "artifacts/encoders.joblib"
  scaler_path: "artifacts/scaler.joblib"
  params:
    IsolationForest:
      n_estimators: 100
      max_samples: "auto"
      contamination: 0.01
      random_state: 42
    LocalOutlierFactor:
      n_neighbors: 20
      contamination: 0.01
      novelty: true
    OneClassSVM:
      kernel: "rbf"
      nu: 0.01

# --- Feature columns (ordered) ---
feature_columns:
  - txn_count_1s
  - txn_count_10s
  - txn_count_30s
  - time_since_last_txn
  - time_since_last_txn_same_amount
  - time_since_last_txn_same_descr
  - avg_time_gap_last_5txn
  - min_time_gap_last_10txn
  - same_acct_amt_descr_count_10min
  - same_acct_amt_count_10min
  - is_exact_duplicate_10min
  - duplicate_streak
  - dc_sign
  - dc_alternation_count_10txn
  - reversal_count_10min
  - amount_zscore_account
  - same_amount_frequency
  - cumulative_amount_10min
  - descr_encoded
  - debit_credit_code_encoded
  - input_source_encoded
  - hour_of_day
  - is_business_hours

# --- Velocity windows ---
velocity_windows:
  txn_count_1s: 1
  txn_count_10s: 10
  txn_count_30s: 30

# --- State store ---
state:
  retention_seconds: 600          # 10 minutes — max window for any feature
  prune_interval_seconds: 60      # how often to run background pruning
  max_history_per_account: 1000   # cap per-account buffer

# --- Ray ---
ray:
  num_cpus: null                  # null = os.cpu_count()
  batch_size: 4096
  num_workers: 4

# --- Encoding maps (static) ---
encoding:
  descr:
    ATM: 0
    Charges: 1
    Fund Transfer: 2
    GIRO: 3
    PayNow: 4
    Payment to IBT: 5
  debit_credit_code:
    C: 0
    D: 1
  input_source:
    A: 0
    M: 1
    T: 2
    Z: 3

# --- Logging ---
logging:
  level: "INFO"
  format: "%(asctime)s | %(name)-28s | %(levelname)-5s | %(message)s"

# --- Synthetic data (used when training from DB) ---
synthetic_data:
  n_rows: 50000
  n_accounts: 250
  anomaly_rate: 0.025
  n_bursts: 50
  burst_min_size: 20
  burst_max_size: 30
  seed: 42

# --- Database (training data source) ---
database:
  host: "localhost"
  user: "root"
  password: "parrot"
  database: "deposit"
  query: >
    SELECT t.*, CAST(account_number AS CHAR) AS account_number
    FROM deposit.tbl_deposit_dat_account_history t
